# Build settings
theme: minima
# theme: jekyll-theme-minimal
#theme: jekyll-theme-minimal
#theme: "jekyll-athena"
plugins:
  - jekyll-feed

# MathJax 3 renders math client-side via _includes/custom-head.html.
# math_engine MUST stay "mathjax": kramdown then wraps $$..$$ in \[..\]/\(..\)
# and HTML-escapes the TeX. GitHub Pages force-overrides math_engine to
# "mathjax" no matter what is written here, so any other value only changes
# local / Stanford-mirror builds and makes them diverge from the live site —
# with `~` (nil), raw TeX like x^{<t>} reached the browser unescaped, got
# parsed as an HTML tag, and broke every equation on the mirror (2026-06-09).
markdown: kramdown
kramdown:
  math_engine: mathjax

future: true

